<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="_base.css" />
    <style>
      :root {
        --warn: #FF4444;
      }
      body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: stretch;
      }
      .side {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 96px 64px;
        gap: 36px;
      }
      .side.before {
        background: var(--bg);
      }
      .side.after {
        background: var(--bg);
        border-left: 1px solid rgba(204, 255, 0, 0.25);
      }
      .label {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 30px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      .before .label {
        color: var(--warn);
      }
      .after .label {
        color: var(--accent);
      }
      .stat {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 132px;
        line-height: 0.9;
        letter-spacing: -0.04em;
      }
      .before .stat {
        color: var(--warn);
        opacity: 0.92;
      }
      .after .stat {
        color: var(--accent);
      }
      .row {
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: 26px;
        line-height: 1.3;
      }
      .before .row {
        color: var(--muted);
      }
      .after .row {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="side before">
      <div class="label">{{before_label}}</div>
      <div class="stat">{{before_stat}}</div>
      <div class="row">{{before_1}}</div>
      <div class="row">{{before_2}}</div>
      <div class="row">{{before_3}}</div>
    </div>
    <div class="side after">
      <div class="label">{{after_label}}</div>
      <div class="stat">{{after_stat}}</div>
      <div class="row">{{after_1}}</div>
      <div class="row">{{after_2}}</div>
      <div class="row">{{after_3}}</div>
    </div>
    <div class="wordmark">SITEWISERS</div>
  </body>
</html>
